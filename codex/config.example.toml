model = "gpt-5.5"
model_reasoning_effort = "xhigh"

[features]
hooks = true
memories = true
js_repl = false

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true

[windows]
sandbox = "elevated"

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

# Local machine paths, MCP runtime paths, trusted project paths, hook hashes,
# native pipe ids, and credentials are intentionally excluded.
# Keep those values in the local ~/.codex/config.toml only.
